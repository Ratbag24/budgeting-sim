<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pence</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f8ef7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pence" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --accent-dim: #3b6fd4;
      --green: #34d399;
      --red: #f87171;
      --amber: #fbbf24;
      --text: #e2e8f0;
      --muted: #8892a8;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: max(24px, env(safe-area-inset-top))
               max(16px, env(safe-area-inset-right))
               max(80px, env(safe-area-inset-bottom))
               max(16px, env(safe-area-inset-left));
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: clamp(0.8rem, 3vw, 1rem);
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      align-items: start;
    }

    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card + .card { margin-top: 16px; }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 5px;
    }

    input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px; /* prevents iOS zoom on focus */
      padding: 12px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus { border-color: var(--accent); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    @media (max-width: 420px) {
      .row2 { grid-template-columns: 1fr; }
    }

    button#calc-btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s;
      touch-action: manipulation;
    }

    button#calc-btn:hover { background: var(--accent-dim); }
    button#calc-btn:active { background: var(--accent-dim); transform: scale(0.98); }

    .results-area { display: none; }
    .results-area.visible { display: block; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    @media (max-width: 560px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .kpi-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: clamp(0.95rem, 3vw, 1.3rem);
      font-weight: 700;
    }

    .kpi-value.green { color: var(--green); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.amber { color: var(--amber); }

    .goal-banner {
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 20px;
      font-weight: 600;
      font-size: clamp(0.85rem, 3vw, 1rem);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .goal-banner.hit { background: rgba(52, 211, 153, 0.12); border: 1px solid var(--green); color: var(--green); }
    .goal-banner.miss { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--red); color: var(--red); }
    .goal-banner.no-goal { background: rgba(79, 142, 247, 0.1); border: 1px solid var(--accent); color: var(--accent); }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .chart-card h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; }

    canvas { max-height: 280px; }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; min-width: 360px; }

    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      text-align: right;
      padding: 11px 14px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    thead th:first-child { text-align: left; }

    tbody tr { border-top: 1px solid var(--border); }
    tbody tr.goal-row { background: rgba(52, 211, 153, 0.07); }
    tbody td { padding: 10px 14px; text-align: right; color: var(--text); white-space: nowrap; }
    tbody td:first-child { text-align: left; color: var(--muted); }

    /* Hide less critical columns on small screens */
    @media (max-width: 540px) {
      .col-gross, .col-net, .col-exp, .col-interest { display: none; }
    }

    .badge-goal {
      background: var(--green);
      color: #0f1117;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .neg { color: var(--red); }

    .exp-total {
      font-size: 0.85rem;
      color: var(--muted);
      padding: 10px 0 2px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .exp-total span {
      color: var(--text);
      font-weight: 600;
    }

    .charts-row {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 700px) {
      .charts-row { grid-template-columns: 1fr; }
    }

    .chart-card { margin-bottom: 0; }
    .chart-card--donut canvas { max-height: 220px; }
    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      padding: 40px 0 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>Pence</h1>
  <p>Every pence counts — project your savings and track your goal</p>
</header>

<div class="layout">

  <!-- LEFT: inputs -->
  <div class="inputs-col">

    <div class="card">
      <div class="section-title">Income</div>
      <div class="field">
        <label>Hourly rate (£)</label>
        <input type="number" id="hourly" min="0" step="0.01" value="14" />
      </div>
      <div class="row2">
        <div class="field">
          <label>Base hours / week</label>
          <input type="number" id="baseHours" min="0" step="0.5" value="37.5" />
        </div>
        <div class="field">
          <label>Overtime hours / week</label>
          <input type="number" id="otHours" min="0" step="0.5" value="0" />
        </div>
      </div>
      <div class="field">
        <label>Overtime multiplier (e.g. 1.5)</label>
        <input type="number" id="otMult" min="1" step="0.1" value="1.5" />
      </div>
      <div class="field">
        <label>Tax / NI estimate (%)</label>
        <input type="number" id="taxPct" min="0" max="100" step="0.1" value="22" />
      </div>
    </div>

    <div class="card">
      <div class="section-title">Monthly Expenses</div>
      <div class="row2">
        <div class="field">
          <label>Rent / Mortgage</label>
          <input type="number" id="exp_rent" min="0" step="1" value="750" />
        </div>
        <div class="field">
          <label>Food & Groceries</label>
          <input type="number" id="exp_food" min="0" step="1" value="200" />
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Utilities</label>
          <input type="number" id="exp_utils" min="0" step="1" value="100" />
        </div>
        <div class="field">
          <label>Transport</label>
          <input type="number" id="exp_transport" min="0" step="1" value="80" />
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Subscriptions</label>
          <input type="number" id="exp_subs" min="0" step="1" value="30" />
        </div>
        <div class="field">
          <label>Other</label>
          <input type="number" id="exp_other" min="0" step="1" value="0" />
        </div>
      </div>
      <div class="exp-total">
        Total outgoings: <span id="exp-total-val">£0.00</span>
      </div>
      <div class="field" style="margin-top:14px">
        <label>Loan / debt repayments (£/month)</label>
        <input type="number" id="loans" min="0" step="1" value="0" />
      </div>
      <div class="field">
        <label>ISA / savings contribution (£/week)</label>
        <input type="number" id="isaWeekly" min="0" step="1" value="50" />
      </div>
    </div>

    <div class="card">
      <div class="section-title">Projection</div>
      <div class="field">
        <label>Starting savings (£)</label>
        <input type="number" id="startSavings" min="0" step="1" value="500" />
      </div>
      <div class="field">
        <label>Annual savings interest rate (%) — e.g. 4.5 for a cash ISA</label>
        <input type="number" id="interestRate" min="0" max="100" step="0.1" value="0" />
      </div>
      <div class="row2">
        <div class="field">
          <label>Months to project</label>
          <input type="number" id="months" min="1" max="360" step="1" value="12" />
        </div>
        <div class="field">
          <label>Savings goal (£) — optional</label>
          <input type="number" id="goal" min="0" step="1" value="5000" />
        </div>
      </div>
    </div>

    <button id="calc-btn">Calculate</button>
  </div>

  <!-- RIGHT: results -->
  <div class="results-col">
    <div class="results-area" id="results">

      <div class="kpi-grid" id="kpi-grid"></div>

      <div id="goal-banner" class="goal-banner"></div>

      <div class="charts-row">
        <div class="chart-card">
          <h3>Savings over time</h3>
          <canvas id="chart"></canvas>
        </div>
        <div class="chart-card chart-card--donut">
          <h3>Where your money goes</h3>
          <canvas id="donut"></canvas>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Month</th>
              <th class="col-gross">Gross (£)</th>
              <th class="col-net">Net (£)</th>
              <th class="col-exp">Expenses (£)</th>
              <th>Leftover (£)</th>
              <th class="col-interest">Interest (£)</th>
              <th>Savings (£)</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>
  const WEEKS_PER_YEAR = 52;
  const MONTHS_PER_YEAR = 12;

  function fmt(n) {
    return n.toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function addMonths(date, n) {
    const d = new Date(date);
    d.setMonth(d.getMonth() + n);
    return d;
  }

  function monthLabel(date) {
    return date.toLocaleDateString("en-GB", { month: "short", year: "numeric" });
  }

  const EXP_CATEGORIES = [
    { id: "exp_rent",      label: "Rent / Mortgage", color: "#4f8ef7" },
    { id: "exp_food",      label: "Food & Groceries", color: "#34d399" },
    { id: "exp_utils",     label: "Utilities",        color: "#fbbf24" },
    { id: "exp_transport", label: "Transport",         color: "#f87171" },
    { id: "exp_subs",      label: "Subscriptions",    color: "#a78bfa" },
    { id: "exp_other",     label: "Other",            color: "#8892a8" },
  ];

  let chartInstance = null;
  let donutInstance = null;

  function updateExpTotal() {
    const total = EXP_CATEGORIES.reduce((s, c) => s + (parseFloat(document.getElementById(c.id).value) || 0), 0);
    document.getElementById("exp-total-val").textContent = `£${total.toLocaleString("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
  }

  document.getElementById("calc-btn").addEventListener("click", () => {
    const get = id => parseFloat(document.getElementById(id).value) || 0;
    const getInt = id => Math.max(1, parseInt(document.getElementById(id).value) || 1);

    const hourly      = get("hourly");
    const baseHours   = get("baseHours");
    const otHours     = get("otHours");
    const otMult      = get("otMult");
    const taxPct      = get("taxPct");
    const expValues   = EXP_CATEGORIES.map(c => ({ ...c, value: get(c.id) }));
    const outgoings   = expValues.reduce((s, c) => s + c.value, 0);
    const loans       = get("loans");
    const isaWeekly   = get("isaWeekly");
    const startSav    = get("startSavings");
    const interestRate = get("interestRate");
    const months      = getInt("months");
    const goalRaw     = get("goal");
    const goal        = goalRaw > 0 ? goalRaw : null;

    const grossWeek    = hourly * baseHours + hourly * otMult * otHours;
    const grossMonth   = grossWeek * (WEEKS_PER_YEAR / MONTHS_PER_YEAR);
    const netMonth     = grossMonth * (1 - taxPct / 100);
    const isaMonth     = isaWeekly * (WEEKS_PER_YEAR / MONTHS_PER_YEAR);
    const totalExp     = outgoings + loans + isaMonth;
    const leftover     = netMonth - totalExp;
    const monthlyRate  = Math.pow(1 + interestRate / 100, 1 / 12) - 1;

    const grossYear = grossMonth * MONTHS_PER_YEAR;
    const netYear   = netMonth   * MONTHS_PER_YEAR;
    const taxPaid   = grossYear  - netYear;

    // KPIs (interest earned appended after projection loop)
    const kpiGrid = document.getElementById("kpi-grid");
    const kpis = [
      { label: "Gross / year",    value: `£${fmt(grossYear)}`,  cls: "" },
      { label: "Tax & NI / year", value: `£${fmt(taxPaid)}`,    cls: "red" },
      { label: "Net / year",      value: `£${fmt(netYear)}`,    cls: "" },
      { label: "Gross / month",   value: `£${fmt(grossMonth)}`, cls: "" },
      { label: "Net / month",     value: `£${fmt(netMonth)}`,   cls: "" },
      { label: "Monthly leftover",value: `£${fmt(leftover)}`,   cls: leftover < 0 ? "red" : "green" },
    ];

    // Projection
    const today = new Date();
    let savings = startSav;
    let goalHitMonth = null;
    let totalInterest = 0;
    const rows = [];
    const labels = [];
    const savingsData = [savings];

    labels.push(monthLabel(today));

    for (let m = 1; m <= months; m++) {
      const interestEarned = (savings + leftover) * monthlyRate;
      savings += leftover + interestEarned;
      totalInterest += interestEarned;
      const dt = addMonths(today, m);
      labels.push(monthLabel(dt));
      savingsData.push(savings);

      if (goalHitMonth === null && goal !== null && savings >= goal) {
        goalHitMonth = { m, date: dt };
      }

      rows.push({ m, dt, grossMonth, netMonth, totalExp, leftover, interestEarned, savings });
    }

    if (interestRate > 0) {
      kpis.push({ label: "Interest earned", value: `£${fmt(totalInterest)}`, cls: "green" });
    }

    kpiGrid.innerHTML = kpis.map(k =>
      `<div class="kpi"><div class="kpi-label">${k.label}</div>
       <div class="kpi-value ${k.cls}">${k.value}</div></div>`
    ).join("");

    // Goal banner
    const banner = document.getElementById("goal-banner");
    if (goal === null) {
      banner.className = "goal-banner no-goal";
      banner.innerHTML = `<span>&#128269;</span> No savings goal set — enter one to track progress.`;
    } else if (goalHitMonth) {
      banner.className = "goal-banner hit";
      banner.innerHTML = `<span>&#9989;</span> Goal of £${fmt(goal)} reached in month ${goalHitMonth.m} (${monthLabel(goalHitMonth.date)}).`;
    } else {
      const shortBy = goal - savings;
      banner.className = "goal-banner miss";
      banner.innerHTML = `<span>&#10060;</span> Goal of £${fmt(goal)} not reached in ${months} months — short by £${fmt(shortBy)}.`;
    }

    // Chart
    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById("chart").getContext("2d");

    const goalLine = goal !== null
      ? { label: "Goal", data: Array(labels.length).fill(goal),
          borderColor: "rgba(52,211,153,0.55)", borderDash: [6,4],
          borderWidth: 1.5, pointRadius: 0, fill: false }
      : null;

    const datasets = [
      { label: "Savings", data: savingsData,
        borderColor: "#4f8ef7", backgroundColor: "rgba(79,142,247,0.12)",
        borderWidth: 2, pointRadius: 3, pointBackgroundColor: "#4f8ef7",
        fill: true, tension: 0.35 },
      ...(goalLine ? [goalLine] : []),
    ];

    chartInstance = new Chart(ctx, {
      type: "line",
      data: { labels, datasets },
      options: {
        responsive: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { labels: { color: "#8892a8", font: { size: 12 } } },
          tooltip: {
            callbacks: {
              label: ctx => ` £${fmt(ctx.raw)}`,
            },
          },
        },
        scales: {
          x: { ticks: { color: "#8892a8", maxRotation: 45, font: { size: 11 } },
               grid: { color: "#22263a" } },
          y: { ticks: { color: "#8892a8",
                        callback: v => `£${v >= 1000 ? (v/1000).toFixed(1)+"k" : fmt(v)}`,
                        font: { size: 11 } },
               grid: { color: "#22263a" } },
        },
      },
    });

    // Donut chart — expense breakdown
    if (donutInstance) donutInstance.destroy();
    const donutCtx = document.getElementById("donut").getContext("2d");
    const donutData = expValues.filter(c => c.value > 0);
    if (loans > 0) donutData.push({ label: "Loans", value: loans, color: "#fb923c" });
    if (isaMonth > 0) donutData.push({ label: "ISA", value: isaMonth, color: "#22d3ee" });
    donutInstance = new Chart(donutCtx, {
      type: "doughnut",
      data: {
        labels: donutData.map(c => c.label),
        datasets: [{ data: donutData.map(c => c.value),
                     backgroundColor: donutData.map(c => c.color),
                     borderWidth: 2, borderColor: "#1a1d27" }],
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: "bottom", labels: { color: "#8892a8", font: { size: 11 }, padding: 10, boxWidth: 12 } },
          tooltip: { callbacks: { label: ctx => ` £${fmt(ctx.raw)}` } },
        },
      },
    });

    // Table
    const tbody = document.getElementById("table-body");
    tbody.innerHTML = rows.map(r => {
      const isGoalRow = goalHitMonth && r.m === goalHitMonth.m;
      const neg = r.leftover < 0 ? " neg" : "";
      const badge = isGoalRow ? `<span class="badge-goal">GOAL</span>` : "";
      return `<tr${isGoalRow ? ' class="goal-row"' : ""}>
        <td>${r.m} — ${monthLabel(r.dt)}${badge}</td>
        <td class="col-gross">£${fmt(r.grossMonth)}</td>
        <td class="col-net">£${fmt(r.netMonth)}</td>
        <td class="col-exp">£${fmt(r.totalExp)}</td>
        <td class="${neg}">£${fmt(r.leftover)}</td>
        <td class="col-interest" style="color:var(--green)">£${fmt(r.interestEarned)}</td>
        <td>£${fmt(r.savings)}</td>
      </tr>`;
    }).join("");

    document.getElementById("results").classList.add("visible");
  });

  const INPUT_IDS = ["hourly","baseHours","otHours","otMult","taxPct","exp_rent","exp_food","exp_utils","exp_transport","exp_subs","exp_other","loans","isaWeekly","startSavings","interestRate","months","goal"];

  function saveInputs() {
    const data = {};
    INPUT_IDS.forEach(id => data[id] = document.getElementById(id).value);
    localStorage.setItem("pence_inputs", JSON.stringify(data));
  }

  function loadInputs() {
    try {
      const data = JSON.parse(localStorage.getItem("pence_inputs"));
      if (!data) return false;
      INPUT_IDS.forEach(id => { if (data[id] !== undefined) document.getElementById(id).value = data[id]; });
      return true;
    } catch { return false; }
  }

  // Load saved inputs or fall back to defaults, then calculate
  loadInputs();
  updateExpTotal();
  document.getElementById("calc-btn").click();

  // Live recalculate and save as user types
  document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", () => {
      updateExpTotal();
      saveInputs();
      document.getElementById("calc-btn").click();
    });
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
  }
</script>

<footer class="footer">
  &copy; <span id="yr"></span> Pence. All rights reserved.
  <script>document.getElementById("yr").textContent = new Date().getFullYear();</script>
</footer>
</body>
</html>
